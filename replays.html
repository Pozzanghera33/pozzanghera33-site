<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Replays | POZZANGHERA 33</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --puddle-blue: #00a8ff;
            --boot-black: #1a1c20;
            --accent-red: #ff7675;
        }

        body {
            margin: 0; background-color: var(--boot-black);
            color: white; font-family: 'Fredoka', sans-serif;
            text-align: center;
        }

        header { padding: 50px 20px; }
        h1 { font-size: 2.5rem; color: var(--puddle-blue); margin-bottom: 10px; }
        
        .video-grid {
            display: grid;
            /* 縦長なので、1列の幅を少し狭めに設定 (250px〜) */
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .video-card {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            /* 縦長比率を維持 */
            aspect-ratio: 9 / 16;
        }

        .video-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-red);
            box-shadow: 0 15px 30px rgba(255, 118, 117, 0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-btn {
            display: inline-block; margin-top: 40px;
            color: var(--puddle-blue); text-decoration: none; font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h1>DEATH REPLAYS</h1>
        <p>Short & Chaotic moments from the commute.</p>
    </header>

    <div class="video-grid" id="video-container">
        </div>

    <script>
        /**
         * 【更新方法】
         * YouTubeのURLが https://youtube.com/shorts/abcde12345 の場合、
         * 'abcde12345' の部分を以下の配列に追加するだけ！
         */
        const videoIds = [
            'ZesyGNkBMLk', // 1つ目の動画ID
            'eDG5JjRBm6I'  // 2つ目の動画ID
            'EK4vfPGL-jg', // 3つ目の動画ID
            '3br-6wk6d_U', // 4つ目... ''
            'UXzp8ik1XXY',
            'TX8QPfg1Y4o',
            'BZk67DV4TsI',
            'j7QmZrhzpcg',
            'ds5ZVLPwYi4',
            'XbarZym32ek',
            'dJUiItqxCwE'  // 12つ目... ''
            // どんどんここに追加
        ];

        const container = document.getElementById('video-container');

        videoIds.forEach(id => {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            // Shortsを埋め込み形式に変換
            card.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${id}" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
